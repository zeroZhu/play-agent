meta:
  name: Daily Farm (Image First)
  design_resolution: [1280, 720]
  loop_count: 200
  random_delay_ms: [70, 150]

device:
  adb_path: adb
  serial: 127.0.0.1:16384

ocr:
  enabled: true
  lang: ch
  min_confidence: 0.58

steps:
  - id: enter_battle
    type: find_image_click
    threshold: 0.91
    timeout_ms: 7000
    retry: 2
    target:
      template:
        - assets/templates/btn_battle.png
        - assets/templates/btn_challenge.png
      roi: [0, 260, 1280, 460]
    action:
      random_offset_px: 4
      random_delay_ms: [90, 180]

  - id: start_fight
    type: find_image_click
    threshold: 0.90
    timeout_ms: 6000
    retry: 2
    target:
      template:
        - assets/templates/btn_start.png
        - assets/templates/btn_go.png
    action:
      random_offset_px: 4

  - id: speed_up
    type: conditional
    threshold: 0.88
    timeout_ms: 3500
    retry: 0
    target:
      mode: image
      template:
        - assets/templates/btn_speed_x2.png
    action:
      on_true:
        type: tap
        use_match_center: true
      on_false:
        type: wait
        seconds: 0.5

  - id: battle_wait
    type: wait
    timeout_ms: 15000
    retry: 0
    action:
      seconds: 6.0

  - id: reward_confirm
    type: find_text_click
    threshold: 0.83
    timeout_ms: 7000
    retry: 2
    target:
      text: 确定
      exact: false
      min_confidence: 0.60
    action:
      random_offset_px: 3

  - id: continue_cycle
    type: loop
    target:
      step_id: enter_battle
    action:
      times: 9999
